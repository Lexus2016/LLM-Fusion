upstream:
  base_url: https://ollama.com        # Ollama Cloud root
  api_key_env: OLLAMA_API_KEY         # env var holding the Bearer key (never inline)
  api_mode: auto                      # auto | openai | native   (default: auto)
  max_concurrency: 4                  # global p-limit across all in-flight calls (default: 4)
  # Per-model concurrency budgets (optional), keyed by REAL upstream model name.
  # Each model gets its own gate IN FRONT of the global limiter, so a burst on
  # one model (e.g. an agent client's background small-model calls) queues at
  # its own gate instead of head-of-line blocking every other model. A model
  # without an override may use the full global budget (identical to a single
  # global limiter — the default behavior when both keys are unset).
  # per_model_concurrency_default: 4  # budget for models without an override
  # per_model_concurrency:
  #   deepseek-v4-pro: 2              # cap a background-traffic carrier
  request_timeout_s: 170              # per upstream call; MUST be < 182 (default: 170)

server:
  bind: 127.0.0.1                     # localhost only (default: 127.0.0.1)
  port: 8080                          # (default: 8080)
  auth_token_env: FUSION_PROXY_TOKEN  # optional; env var holding the shared client token.
                                      # If unset, proxy runs unauthenticated and warns.

defaults:                             # applied to every model unless overridden per-model
  panel_member_timeout_s: 90          # per panel member (default: 90)
  judge_timeout_s: 60                 # judge stage (default: 60)
  min_panel_success: 2                # min successful panel answers, else 502 (default: 1)

models:
  # --- fusion strategy (Phase 3) ---
  fusion-1:
    strategy: fusion
    panel: [glm-5.2, kimi-k2.7-code, deepseek-v4-pro]
    judge: glm-5.2
    synth: deepseek-v4-pro
    # tool_mode — how requests that carry tools/function-calls are handled (fusion only):
    #   deliberate (default): panel members deliberate in PROSE with the tools STRIPPED;
    #     only the synth model is given the real tool schema and emits one canonical
    #     tool_call. Keeps fusion's cross-check even on agentic/tool steps.
    #   bypass: skip panel+judge, send straight to synth with the tools (1 call instead
    #     of 5) — faster/cheaper, but no deliberation on tool decisions.
    tool_mode: deliberate

    # fusion_planning_turn_only — cost knob for fusion running inside an agent loop:
    #   false (default): the full panel -> judge -> synth runs on EVERY request (5 calls),
    #     including the mechanical tool-continuation steps.
    #   true: full fusion runs on every PLANNING turn — any request whose LATEST message is a
    #     fresh user/system instruction — and degrades to synth-only (5 calls -> 1) ONLY on
    #     mid-loop continuations (latest message is a tool result: "read this output, pick the
    #     next call"). A brand-new task/refinement deep in a multi-day session still gets the
    #     full panel; only the mechanical in-between steps run cheap.
    fusion_planning_turn_only: false

    # Optional BinEval post-synth quality evaluation (non-streaming responses only).
    # Adds one extra evaluator call after the synth stage and returns per-dimension
    # scores in response headers: X-Fusion-Bineval-Score, X-Fusion-Bineval-Dimensions,
    # and X-Fusion-Bineval-Low-Score when the overall score is below threshold.
    # When bineval is configured but the evaluation does NOT run, the proxy sets
    # X-Fusion-Bineval-Skipped: <reason> (streaming | synth_error | eval_failed |
    # empty_output | non_json_body | synth_only) so a client can tell "score is high"
    # apart from "evaluation never ran". bineval is report-only — it does NOT trigger
    # a re-deliberation loop.
    # Useful for factual consistency checks on research / report outputs.
    # bineval:
    #   enabled: true
    #   model: glm-5.2          # evaluator model; defaults to the fusion judge model
    #   threshold: 0.7          # overall score below this marks the output as low-quality
    #   timeout_s: 60           # per-evaluation timeout; defaults to defaults.judge_timeout_s
    #   # Custom binary questions (optional; omit to use the built-in defaults):
    #   dimensions:
    #     - dimension: factual_consistency
    #       question: "Does the answer contain only claims well-supported by the request and accepted facts?"

    # Optional adversarial panel member: one of the panel models is instructed to
    # steelman the OPPOSITE case and hunt for flaws, hidden assumptions, edge
    # cases, and race conditions instead of agreeing with the consensus. This is
    # role-based decorrelation on top of the lineage-based one: it forces the panel
    # to contain a genuine dissenting voice, which the judge folds into
    # `disagreements` and `blind_spots`. The value is "find the flaw", not
    # "fabricate a flaw" — the adversarial member is allowed to say "I cannot find
    # a real problem" when the consensus is actually solid.
    # The value must be a model name ALREADY listed in this model's `panel`.
    # The adversarial member is never early-cancelled, so it adds latency equal to
    # the slowest panel member (the others are aborted once min_panel_success is
    # met and it is still running).
    # adversarial: kimi-k2.7-code

    # Optional web grounding for the panel (research freshness). The proxy runs
    # ONE Tavily search before the panel fans out and injects the cleaned results
    # as prose context into every panel member — no member receives real tools,
    # so the one-tool_calls-per-step invariant is preserved.
    # Gated TWO ways (both required, else fully OFF, no latency/cost):
    #   1. TAVILY_API_KEY must be set in the environment (.env).
    #   2. web_search.enabled must be true here.
    # A failed search degrades silently to an ungrounded panel. Respects
    # fusion_planning_turn_only (no web search on mid-loop tool-result turns).
    # web_search:
    #   enabled: true
    #   max_results: 3           # Tavily results to fetch (1-10)
    #   timeout_s: 20            # per-search timeout (< 60)
    #   max_context_chars: 4000  # cap on the injected context block

  # --- single strategy (Phase 1) ---
  fast-1:
    strategy: single
    target: deepseek-v4-pro

  # --- failover strategy (Phase 2) ---
  resilient-1:
    strategy: failover
    chain: [glm-5.2, kimi-k2.7-code, deepseek-v4-pro]

  # --- smart strategy (Phase 4) ---
  smart-1:
    strategy: smart
    router: glm-5.2                   # fast classifier model (one non-streamed JSON call per request)
    default: simple                   # route used when the router is unsure / errors (simple | fusion; default: simple)
    escalate_on_tool_error: true      # agent-loop: a failing latest tool result (error / exception / non-zero exit / test failure)
                                      #   skips the router and goes straight to fusion — re-deliberate on recovery (default: true)
    simple: { target: deepseek-v4-pro }   # inline single-strategy block, OR a string naming another model (e.g. simple: fast-1)
    fusion:                           # inline fusion-strategy block, OR a string naming another model (e.g. fusion: fusion-1)
      panel: [glm-5.2, kimi-k2.7-code, deepseek-v4-pro]
      judge: glm-5.2
      synth: deepseek-v4-pro

  # =========================================================================
  # Task-specialized presets — the recommended, ready-to-use models (this is
  # what actually ships in fusion.yaml). Assembled from an empirical model
  # shoot-out. Panels deliberately MIX MODEL
  # LINEAGES — 3 models from the same lab share training blind spots, which
  # defeats the point of a panel; each panel adds a Western decorrelator.
  # =========================================================================

  fusion-coder:                       # programming / planning / audit — fusion (multiple viewpoints)
    strategy: fusion
    panel: [glm-5.2, kimi-k2.7-code, gpt-oss:120b]  # GLM + Moonshot + OpenAI-OSS (Western decorrelator).
                                                    # NOT gemini here: a Gemini panel member 400s ("thought_signature")
                                                    # on tool-call history from other models and is dropped silently.
    judge: glm-5.2                    # most reliable structured-JSON of the field -> fewer judge-parse failures
    synth: kimi-k2.7-code             # most complete, compilable code generator in the shoot-out
    tool_mode: deliberate
    fusion_planning_turn_only: true  # full panel on the planning turn, synth-only mid-loop (cost knob)

  fusion-researcher:                  # research / analysis / reports — fusion for breadth
    strategy: fusion
    panel: [kimi-k2.7-code, glm-5.2, gpt-oss:120b]            # Moonshot + GLM + OpenAI-OSS (Western decorrelator)
    judge: glm-5.2
    synth: kimi-k2.7-code             # scored 15/15 on research; cleanest report-ready prose
    tool_mode: deliberate
    fusion_planning_turn_only: false  # research is not a mechanical loop — deliberate every step

  fusion-agents:                      # autonomous agent loops — smart routing (cheap by default)
    strategy: smart
    router: glm-5.2                   # fast + reliable JSON classifier (router shoot-out winner)
    default: simple
    escalate_on_tool_error: true      # a failing tool result (test failure / error) -> straight to fusion;
                                      # error-recovery is exactly where multiple viewpoints earn their cost
    simple: { target: kimi-k2.7-code }   # mechanical steps (read / grep / run). MUST accept tool-call history from
                                         # OTHER models in the loop: gemini-3-flash-preview rejects it with 400
                                         # "Function call is missing a thought_signature in functionCall parts" (a
                                         # Gemini-only requirement) because the loop's tool_calls come from the kimi
                                         # synth, not Gemini — which breaks the agent session. kimi handles it cleanly.
    fusion: fusion-coder              # substantive steps -> the coder panel. When the router routes a step to
                                      # fusion, the FULL panel runs even mid-loop (planning_turn_only is overridden)

overrides:                            # used ONLY when /api/show discovery misses
  kimi-k2.7-code:                     # illustrative shape; Phase 0 confirmed kimi-k2.7-code is vision-capable via /api/show
    tools: true
    vision: true
    context: 262144

pricing:                              # OPTIONAL cost accounting (USD per 1M tokens).
                                      # Keyed by the REAL upstream model id (target/chain/panel/judge/synth/router),
                                      # not the virtual model name. Omit entirely to leave cost_usd null (default).
                                      # When present, the proxy logs cost_usd per request and sums per-call cost
                                      # by each call's own model (so fusion mixes prices correctly).
  glm-5.2:
    input_per_mtok: 0.50              # USD charged per 1,000,000 prompt (input) tokens
    output_per_mtok: 1.50             # USD charged per 1,000,000 completion (output) tokens
  deepseek-v4-pro:
    input_per_mtok: 0.80
    output_per_mtok: 2.40
  # The task-specialized presets above also use these models — add their real
  # per-1M-token Ollama Cloud prices to get cost_usd on those requests:
  # kimi-k2.7-code:          { input_per_mtok: 0.00, output_per_mtok: 0.00 }
  # gemini-3-flash-preview:  { input_per_mtok: 0.00, output_per_mtok: 0.00 }
  # "gpt-oss:120b":          { input_per_mtok: 0.00, output_per_mtok: 0.00 }   # quote keys containing ':'
