# llm-fusion — active config (loaded by default; override the path with FUSION_CONFIG).
# Minimal, working setup against Ollama Cloud using real library models.
# See fusion.example.yaml for the fully annotated reference (every option + defaults).

upstream:
  # base_url + api_key_env now live under `providers:` below (new format).
  # These remain pool-wide settings shared by every provider/account.
  api_mode: openai # Phase 0 confirmed: /v1 chat + SSE + tool_calls all work (auto | openai | native)
  max_concurrency: 8 # global p-limit across all in-flight calls (default: 4)
  per_model_concurrency:
    # per-model gates INSIDE the global limit: a burst on one
    deepseek-v4-pro: 2
      # model queues at its own gate instead of head-of-line
      # blocking interactive turns. deepseek-v4-pro carries the
      # Claude Code background small-model bursts (80-130/min);
      # 2 slots keep them flowing without occupying the queue.
  request_timeout_s: 180
    # per upstream call; MUST be < 182 (default: 170).
    # Raised from 120 -> 170: a full fusion-coder/researcher path
    # (panel -> judge -> synth -> bineval) on a heavy prompt can
    # exceed 120s at the synth stage and 504 before bineval attaches
    # its headers. 170 leaves a safety margin under the ~182s upstream
    # ceiling and lets the synth + bineval stages finish.

# Provider groups (NEW format). Failover happens across the ACCOUNTS of ONE
# provider (same models), so a fusion stays consistent when an account degrades.
# A virtual model binds to a group via `provider:`; with a single group it is
# optional, so every model below auto-binds to this one. Manage it all live at
# http://127.0.0.1:8080/panel
providers:
  ollama-cloud:
    # provider group id (referenced by models' `provider:`)
    type: ollama # ollama | openai-compat
    base_url: https://ollama.com # Ollama Cloud root (group default)
    accounts:
      # failover across these — same models, different keys
      - id: ollama-1
        api_key_env: OLLAMA_API_KEY # env var holding the Bearer key (never inline)
      # Add a SECOND Ollama account to rotate on limits / billing (same models):
      # - id: ollama-2
      #   api_key_env: OLLAMA_API_KEY_2
      # A DIFFERENT provider = its own group with DIFFERENT models, e.g. OpenRouter.
      # Models bound to it need `provider: openrouter` and this group's model ids:
      # openrouter:
      #   type: openai-compat
      #   base_url: https://openrouter.ai/api/v1
      #   accounts:
      #     - id: openrouter-1
      #       api_key_env: OPENROUTER_API_KEY
      #       model_map: { "glm-5.2": "z-ai/glm-4.6", "kimi-k2.7-code": "moonshotai/kimi-k2" }

server:
  bind: 127.0.0.1
    # localhost only. For Docker set 0.0.0.0 here
    # (or run with FUSION_BIND=0.0.0.0) so the host can reach it.
  port: 8080
  # auth_token_env: FUSION_PROXY_TOKEN  # optional: when set, clients must send
  # Authorization: Bearer <value-of-that-env-var>.
  # Unset = unauthenticated (localhost single-user) + startup warning.

defaults:
  # applied to every model unless overridden per-model
  panel_member_timeout_s: 90 # per panel member (default: 90)
  judge_timeout_s: 120 # judge stage (default: 60)
  min_panel_success: 2 # min successful panel answers, else 502 (default: 1)

models:
  # single — 1:1 passthrough to one fast model.
  fast-glm:
    strategy: single
    target: glm-5.2
    # Suppress glm's chain-of-thought on the (mechanical) simple agent route: no
    # reasoning to leak into chat, and ~3x faster (A/B: 1692->0 reasoning chars,
    # 6s->2s, tool-calling intact). Restores the optimization lost in the
    # `simple: fast-glm` refactor. request_overrides is honored by the single
    # strategy (and by the smart `simple` route that resolves to this model).
    request_overrides:
      reasoning_effort: "none"

  # single — 1:1 passthrough to one fast model.
  fast-kimi:
    strategy: single
    target: kimi-k2.7-code

  # single — 1:1 passthrough to one fast model.
  fast-deepseek:
    strategy: single
    target: deepseek-v4-pro

  # =========================================================================
  # Task-specialized virtual models — assembled from an empirical model shoot-out
  # (8 models x 3 probes: coding, research, tool-calling — 2026-06-27). Quality scored /15.
  # Panels MIX MODEL LINEAGES on purpose: 3 models from the same lab share
  # training blind spots, which defeats the point of a panel. glm/kimi/
  # deepseek/minimax/qwen are all Chinese labs; gemini=Google, gpt-oss=OpenAI
  # are added as Western decorrelators.
  # =========================================================================

  # fusion-coder — programming, planning, audit. Fusion = multiple viewpoints
  #   (coding/architecture decisions genuinely benefit from diverse takes).
  #   Panel history: P1 (2026-06-27) was glm+kimi+gpt-oss; gpt-oss's 131K ctx became
  #   the fusion-agents context bottleneck, so it was swapped for mistral-large-3:675b
  #   (2026-07-08, 262K ctx). Panel changed again same day to the 4-model lineup below
  #   (glm-5.2 dropped from the panel, stays judge+synth).
  #   gemini-3-flash previously 400'd with "missing thought_signature in functionCall
  #   parts" on panel requests carrying foreign tool-call history (every agent-loop
  #   step) — a 2026-07-08 spot-check (2 synthetic multi-turn probes, with and without
  #   an active tools schema) did NOT reproduce the 400, but this is not exhaustive;
  #   watch the `tool-turn terminal state` log line in real agent-loop sessions.
  fusion-coder:
    strategy: fusion
    panel: [ kimi-k2.7-code, deepseek-v4-pro, gemini-3-flash-preview, qwen3-coder-next ]
    # panel: [kimi-k2.7-code, minimax-m3, gpt-oss:120b]   # earlier 3-model alternative, unused
    # Benchmark (bench/fusion-bench.mjs, 15/15 tasks, this panel): the fused answer beat
    # every panel member AND solo glm-5.2 on the 9/15 tasks that completed cleanly
    # (29.56/30 vs best member 26.67/30) — the panel/judge/synth mechanism is sound.
    # The other 6/15 tasks were dragged down by a separate synth bug (the synth
    # narrating its own reasoning — "Expert 1 says X... I will provide..." — into the
    # visible answer, sometimes exhausting the token budget before a real answer),
    # fixed in src/strategies/fusion.ts (SYNTH_DIRECT_ANSWER_DIRECTIVE, 2026-07-08).
    # kimi-k2.7-code is the weakest panel voice in this bench (17.00/30) — prone to
    # long, rambling generations that eat its own token budget; no per-panel-member
    # request_overrides mechanism exists yet to throttle it (only single/smart.simple
    # support request_overrides — see src/config.ts).
    judge: glm-5.2 # most reliable structured-JSON (router shoot-out) -> fewer judge-parse failures
    synth: glm-5.2
      # CHANGED 2026-07-07 (fusion-lift bench, docs/llm-fusion-audit.md):
      # as synth, kimi emitted 17-19k-char draft-style output on factual/
      # reasoning tasks and dragged fusion to 0.71 (below every solo);
      # with glm-5.2 as synth the same pipeline scored 0.99 vs 0.89 for
      # the best solo — the fused model finally EXCEEDS every member.
      # kimi stays on the panel (its material remains valuable input).
    tool_mode: deliberate
    # Suppress the SYNTH's chain-of-thought: glm-5.2 as synth only ASSEMBLES the
    # panel+judge deliberation, so its own reasoning is redundant, leaks English CoT
    # into the agent's chat, and adds latency. reasoning_effort:"none" stops it.
    # Panel members keep full reasoning — that is where the deliberation value lives.
    synth_request_overrides:
      reasoning_effort: "none"
    fusion_planning_turn_only: false
      # full panel on EVERY fresh user instruction (a new task /
      # refinement / module — even days into one chat); synth-only
      # only on mid-loop tool-result continuations (cost knob)
    # Optional BinEval post-synth quality evaluation (non-streaming responses only).
    # Adds one extra evaluator call after the synth stage and returns per-dimension
    # scores in response headers: X-Fusion-Bineval-Score, X-Fusion-Bineval-Dimensions,
    # and X-Fusion-Bineval-Low-Score when the overall score is below threshold.
    # Useful for factual consistency checks on research / report outputs.
    bineval:
      enabled: true
      model: deepseek-v4-pro
        # CHANGED 2026-07-07: glm-5.2 became the coder SYNTH (v0.1.23),
        # so a glm evaluator would self-grade its own answers.
        # deepseek-v4-pro sits outside this pipeline entirely
        # (bineval runs rarely — non-streaming responses only —
        # so sharing the capped background-traffic model is fine).
      threshold: 0.7 # overall score below this marks the output as low-quality
      timeout_s: 60 # per-evaluation timeout; defaults to defaults.judge_timeout_s
      # Custom binary questions (optional; omit to use the built-in defaults):
      dimensions:
        - dimension: factual_consistency
          question: "Does the answer contain only claims well-supported by the request and
            accepted facts?"

    # Optional web grounding for the panel (research freshness). The proxy runs
    # ONE Tavily search before the panel fans out and injects the cleaned results
    # as prose context into every panel member — no member receives real tools,
    # so the one-tool_calls-per-step invariant is preserved.
    # Gated TWO ways (both required, else fully OFF, no latency/cost):
    #   1. TAVILY_API_KEY must be set in the environment (.env).
    #   2. web_search.enabled must be true here.
    # A failed search degrades silently to an ungrounded panel. Respects
    # fusion_planning_turn_only (no web search on mid-loop tool-result turns).
    web_search:
      enabled: true
        # OFF for the coder (2026-07-07): agent tool-loops route here, and
        # grounding added ~12s of pre-panel silence per deliberate turn
        # (measured 12.7s of a 28.7s time-to-first-byte) while searching
        # for things like "create page.html" — pure latency, no value.
        # fusion-researcher keeps grounding ON (freshness matters there).
      max_results: 5 # Tavily results to fetch (1-10)
      timeout_s: 10 # per-search timeout (< 60)
      max_context_chars: 4000 # cap on the injected context block

  # fusion-researcher — research, analysis, reports. Fusion for breadth.
  #   P2: kimi 15 (flawless, BEST WRITER) | glm-5.2 14 (fast, best framing) |
  #   gpt-oss:120b 13 (most exhaustive coverage + Western lineage).
  fusion-researcher:
    strategy: fusion
    panel: [ kimi-k2.7-code, glm-5.2, gpt-oss:120b ]
    judge: glm-5.2
    synth: kimi-k2.7-code # scored 15/15; cleanest report-ready prose
    tool_mode: deliberate
    fusion_planning_turn_only: false # research isn't a mechanical loop — full deliberation each step is the value
    # Optional BinEval post-synth quality evaluation (non-streaming responses only).
    # Adds one extra evaluator call after the synth stage and returns per-dimension
    # scores in response headers: X-Fusion-Bineval-Score, X-Fusion-Bineval-Dimensions,
    # and X-Fusion-Bineval-Low-Score when the overall score is below threshold.
    # Useful for factual consistency checks on research / report outputs.
    bineval:
      enabled: true
      model: deepseek-v4-pro
        # CHANGED 2026-07-08: glm-5.2 is BOTH a researcher panel member
        # and the judge, so it was grading an answer it helped write and
        # adjudicate — not literal self-grading (kimi is the synth) but a
        # real correlation risk. deepseek-v4-flash sits outside this
        # pipeline entirely (not panel/judge/synth here) and on a synthetic
        # fabrication probe matched deepseek-v4-pro's correct verdict at
        # roughly half the latency (~3.7s vs ~6.7s) and fewer tokens.
        # deepseek-v3.2 was also tried and rejected: 42-49s, 3-4x more
        # tokens, no better discrimination on the same probe.
      threshold: 0.7 # overall score below this marks the output as low-quality
      timeout_s: 60 # per-evaluation timeout; defaults to defaults.judge_timeout_s
      # Custom binary questions (optional; omit to use the built-in defaults):
      dimensions:
        - dimension: factual_consistency
          question: "Does the answer contain only claims well-supported by the request and
            accepted facts?"

    # Optional web grounding for the panel (research freshness). The proxy runs
    # ONE Tavily search before the panel fans out and injects the cleaned results
    # as prose context into every panel member — no member receives real tools,
    # so the one-tool_calls-per-step invariant is preserved.
    # Gated TWO ways (both required, else fully OFF, no latency/cost):
    #   1. TAVILY_API_KEY must be set in the environment (.env).
    #   2. web_search.enabled must be true here.
    # A failed search degrades silently to an ungrounded panel. Respects
    # fusion_planning_turn_only (no web search on mid-loop tool-result turns).
    web_search:
      enabled: true
      max_results: 10 # Tavily results to fetch (1-10)
      timeout_s: 30 # per-search timeout (< 60)
      max_context_chars: 8000 # cap on the injected context block
  # fusion-agents — autonomous agent loops. Smart routing: keep the cheap 80%
  #   cheap, escalate the hard 20%. P3 tool-calling was reliable on ALL models
  #   (<2s, correct first action) -> agent choice = planning quality + cost,
  #   NOT tool-calling.
  fusion-agents:
    strategy: smart
    provider: ollama-cloud
    router: glm-5.2
    default: simple
    simple: fast-glm
    fusion: fusion-coder
